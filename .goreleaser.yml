version: 2

project_name: mage

release:
  github:
    owner: magefile
    name: mage
  draft: true
builds:
  - binary: mage
    main: .
    ldflags: -s -w -X github.com/magefile/mage/mage.timestamp={{.Date}} -X github.com/magefile/mage/mage.commitHash={{.Commit}} -X github.com/magefile/mage/mage.gitTag={{.Version}}
    goos:
      - darwin
      - linux
      - windows
      - freebsd
      - netbsd
      - openbsd
      - dragonfly
    goarch:
      - amd64
      - arm
      - arm64
    ignore:
      - goos: openbsd
        goarch: arm
        goarm: 6
      - goos: windows
        goarch: arm
        goarm: 6
    env:
      - CGO_ENABLED=0
archives:
-
  name_template: >-
    {{.Binary}}_{{.Version}}_{{.Os}}_{{.Arch}}
  formats:
    - tar.gz
  format_overrides:
    - goos: windows
      formats:
        - zip
  files:
  - LICENSE
snapshot:
  version_template: SNAPSHOT-{{ .Commit }}
checksum:
  name_template: '{{ .ProjectName }}_{{ .Version }}_checksums.txt'
